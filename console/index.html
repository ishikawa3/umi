<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>かいしょう — 海の運用コンソール | KAISHŌ VTS Console</title>
    <meta name="description" content="海上保安庁「海しる」APIの実データを、業務システム風の3D運用コンソールで。うみ（データアート）の陰画。three.js/WebGL。" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230a1826'/><circle cx='16' cy='16' r='9' fill='none' stroke='%235ee0d8' stroke-width='2'/><path d='M7 16h18M16 7v18' stroke='%235ee0d8' stroke-width='1' opacity='.5'/></svg>" />
    <meta name="theme-color" content="#0a1826" />
    <meta property="og:site_name" content="かいしょう" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="かいしょう — 海の運用コンソール" />
    <meta property="og:description" content="海しるAPIの実データを業務システム風の3D運用コンソールで。うみの陰画。" />
    <meta property="og:url" content="https://ishikawa3.github.io/umi/console/" />
    <meta property="og:locale" content="ja_JP" />
    <link rel="canonical" href="https://ishikawa3.github.io/umi/console/" />
  </head>
  <body>
    <!-- ヘッダ -->
    <header class="hdr">
      <div class="brand">
        <span class="mark">Kaishō</span>
        <span class="sub">VTS Console</span>
      </div>
      <div class="hdr-spacer"></div>
      <span class="duty">当直 — （デモ表示）</span>
      <span class="clock" id="clock" aria-label="日本標準時">—</span>
      <span class="conn" aria-label="海しる接続状態">
        <span class="led" id="conn-led" data-state="checking"></span>
        <span class="txt" id="conn-text">海しる 接続確認中…</span>
      </span>
    </header>

    <!-- 本体: 左レイヤ / 中央3D海図 / 右インスペクタ -->
    <div class="body">
      <aside class="panel left" aria-label="レイヤ・海域・凡例">
        <h2>レイヤ</h2>
        <div id="layer-list"></div>
        <div id="warn-filter-section">
          <h2>警報 種別フィルタ</h2>
          <div id="filter-list"></div>
        </div>
        <div id="area-section" hidden>
          <h2>海域 · 潮流</h2>
          <div class="area-box">
            <select id="area-select" class="area-select" aria-label="潮流の海域"></select>
          </div>
        </div>
        <div id="legend-section" hidden>
          <h2>凡例</h2>
          <div id="legend" class="legend"></div>
        </div>
      </aside>

      <main class="chart" id="chart" aria-label="3D海図（海しるデータの運用コンソール）">
        <div class="overlay-title">
          <div class="t">海図 · 航行警報</div>
          <div class="s">Japan Coastal Waters · Navigational Warnings</div>
        </div>
      </main>

      <aside class="panel right" aria-label="詳細パネル">
        <div class="rp-tabs" id="rp-tabs"></div>

        <div class="rp-panel" id="rp-warnings">
          <h2>航行警報一覧 <span class="count" id="warn-count"></span></h2>
          <div class="warning-list" id="warning-list"></div>
          <h2>インスペクタ</h2>
          <div class="inspector-body" id="inspector-body">対象未選択</div>
        </div>

        <div class="rp-panel" id="rp-tide" hidden>
          <h2>検潮所 <span class="count" id="tide-count"></span></h2>
          <div class="tide-table" id="tide-table"></div>
          <h2>潮位曲線</h2>
          <div class="tide-detail" id="tide-detail">
            <div class="tide-name" id="tide-name">検潮所を選択</div>
            <canvas id="tide-curve" width="300" height="120"></canvas>
            <div class="tide-hilo" id="tide-hilo"></div>
          </div>
        </div>
      </aside>
    </div>

    <!-- ステータスバー -->
    <footer class="statusbar">
      <span class="mono" id="st-coord">緯経 —</span>
      <span class="mono" id="st-zoom">ズーム —</span>
      <span class="mono" id="st-count">海域 —</span>
      <span class="time-ctl" id="time-ctl" hidden>
        <button id="time-play" class="time-play" aria-label="潮流の再生/一時停止">❚❚</button>
        <input type="range" id="time-slider" min="0" max="1" step="0.01" aria-label="潮流の時刻" />
        <span class="mono" id="time-label">—</span>
      </span>
      <span class="ticker" id="ticker">—</span>
    </footer>

    <!-- モバイル用: パネルをボトムシートで開くタブバー＋背景 -->
    <div id="m-backdrop" class="m-backdrop"></div>
    <nav class="m-tabbar" aria-label="パネル切替">
      <button id="m-layers" class="m-tab" type="button">レイヤ</button>
      <button id="m-detail" class="m-tab" type="button">一覧・詳細</button>
    </nav>

    <div id="tooltip" role="tooltip"></div>
    <div id="toast" role="status" aria-live="polite"></div>

    <p class="credit">
      データ: 海上保安庁
      <a href="https://portal.msil.go.jp/" target="_blank" rel="noopener">海洋状況表示システム「海しる」API</a>
      ／海岸線: <a href="https://www.naturalearthdata.com/" target="_blank" rel="noopener">Natural Earth</a>（パブリックドメイン）
      ／航海には使用しないでください
    </p>

    <script type="module" src="/console/main.ts"></script>
  </body>
</html>
