<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>うみ — 潮流のかたち | Tidal Currents of Japan</title>
    <meta name="description" content="海上保安庁「海しる」APIの潮流推算データによるリアルタイム・フローフィールド" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2304070f'/><g fill='none' stroke='%237fe3e0' stroke-width='2.2' stroke-linecap='round'><path d='M6 13c3-3.5 5 3.5 8 0s5 3.5 8 0' opacity='.95'/><path d='M6 21c3-3.5 5 3.5 8 0s5 3.5 8 0' opacity='.45'/></g></svg>" />
    <meta property="og:site_name" content="うみ" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="うみ — 潮流のかたち" />
    <meta property="og:description" content="海上保安庁「海しる」APIの実データで、日本の海の「いま」を描く" />
    <meta property="og:url" content="https://ishikawa3.github.io/umi/" />
    <meta property="og:image" content="https://ishikawa3.github.io/umi/og.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <canvas id="sea"></canvas>

    <header class="hud hud-title">
      <h1 id="area-title">…</h1>
      <p id="area-sub"></p>
      <p class="site-name">うみ — 潮流のかたち</p>
    </header>

    <nav class="hud hud-areas" aria-label="海域選択">
      <div id="area-chips"></div>
    </nav>

    <!-- E-1: モバイル用ドロワートグル -->
    <button id="drawer-toggle" class="hud drawer-toggle" aria-label="海域を選ぶ" aria-expanded="false" aria-controls="area-drawer">≡</button>
    <div id="drawer-overlay" class="drawer-overlay"></div>
    <div id="area-drawer" class="area-drawer" aria-label="海域選択ドロワー"></div>

    <footer class="hud hud-bottom">
      <button id="play" aria-label="一時停止">❚❚</button>
      <input id="time-slider" type="range" step="0.01" aria-label="時刻" />
      <span id="time-label"></span>
      <!-- B-3: 共有ボタン -->
      <button id="share" aria-label="スクリーンショットを共有">📷</button>
    </footer>

    <aside class="hud hud-legend">
      <span class="legend-label">流速</span>
      <span class="legend-tick">0</span>
      <canvas id="legend-ramp" width="120" height="8"></canvas>
      <span class="legend-tick" id="legend-max"></span>
    </aside>

    <!-- B-2: キーボードヒント -->
    <div id="kb-hint" class="hud kb-hint" aria-hidden="true">Space 再生/停止 &nbsp; ← → 時刻移動</div>

    <div id="status" class="hud" role="status"></div>
    <div id="tooltip" role="tooltip"></div>

    <p class="hud credit">
      データ: 海上保安庁
      <a href="https://portal.msil.go.jp/" target="_blank" rel="noopener">海洋状況表示システム「海しる」API</a>
      （潮流推算・等深線）／水域判定:
      <a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noopener">国土地理院 淡色地図</a>
      ／航海には使用しないでください
    </p>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
