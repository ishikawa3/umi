<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>うみ — 潮流のかたち | Tidal Currents of Japan</title>
    <meta name="description" content="海上保安庁「海しる」APIの潮流推算データによるリアルタイム・フローフィールド" />
  </head>
  <body>
    <canvas id="sea"></canvas>

    <header class="hud hud-title">
      <h1 id="area-title">…</h1>
      <p id="area-sub"></p>
      <p class="site-name">うみ — 潮流のかたち</p>
    </header>

    <nav class="hud hud-areas" aria-label="海域選択">
      <div id="area-chips"></div>
    </nav>

    <footer class="hud hud-bottom">
      <button id="play" aria-label="一時停止">❚❚</button>
      <input id="time-slider" type="range" step="0.01" aria-label="時刻" />
      <span id="time-label"></span>
    </footer>

    <aside class="hud hud-legend">
      <span class="legend-label">流速</span>
      <span class="legend-tick">0</span>
      <canvas id="legend-ramp" width="120" height="8"></canvas>
      <span class="legend-tick" id="legend-max"></span>
    </aside>

    <div id="status" class="hud" role="status"></div>
    <div id="tooltip" role="tooltip"></div>

    <p class="hud credit">
      データ: 海上保安庁
      <a href="https://portal.msil.go.jp/" target="_blank" rel="noopener">海洋状況表示システム「海しる」API</a>
      （潮流推算・等深線）／水域判定:
      <a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noopener">国土地理院 淡色地図</a>
      ／航海には使用しないでください
    </p>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
