<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>こえ | うみ</title>
    <meta name="description" content="海上保安庁「海しる」航行警報 — いま日本の海で起きていること" />
  </head>
  <body>
    <canvas id="sea"></canvas>

    <header class="hud hud-title">
      <h1>こえ</h1>
      <p class="sub">Voices of the Sea</p>
      <p class="meta" id="koe-count"></p>
      <p class="site-name">うみ — 潮流のかたち</p>
    </header>

    <aside class="hud hud-list" id="warning-list" aria-label="航行警報一覧"></aside>

    <div class="hud hud-panel" id="detail-panel" hidden>
      <button id="panel-close" aria-label="閉じる">×</button>
      <h2 id="panel-title"></h2>
      <p id="panel-body"></p>
    </div>

    <div id="status" class="hud" role="status"></div>
    <div id="tooltip" role="tooltip"></div>

    <p class="hud credit">
      データ: 海上保安庁
      <a href="https://portal.msil.go.jp/" target="_blank" rel="noopener">海洋状況表示システム「海しる」API</a>
      （航行警報）／陸域: 国土地理院 淡色地図／航海には使用しないでください
    </p>

    <script type="module" src="/src/koe.ts"></script>
  </body>
</html>
